<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practica Inglés con Alex</title>
<style>
  :root{
    --bg: #fbf9f6;
    --panel: #ffffff;
    --ink: #2b2730;
    --muted: #8a8190;
    --accent: #6d4ee0;
    --accent-soft: #efe9fc;
    --accent-dark: #5436b8;
    --correction: #fff4e6;
    --correction-border: #f3b96b;
    --tip: #eaf6ee;
    --tip-border: #7cc99a;
    --user-bubble: #6d4ee0;
    --bot-bubble: #f3f1f8;
    --radius: 18px;
    --shadow: 0 8px 24px rgba(80, 60, 140, 0.08);
  }
  *{box-sizing:border-box;}
  html,body{height:100%;margin:0;}
  body{
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    background: linear-gradient(180deg,#fbf9f6 0%, #f3eefb 100%);
    color: var(--ink);
    display:flex;
    justify-content:center;
    padding: 16px;
  }
  .app{
    width:100%;
    max-width: 640px;
    display:flex;
    flex-direction:column;
    height: calc(100vh - 32px);
    background: var(--panel);
    border-radius: 24px;
    box-shadow: var(--shadow);
    overflow:hidden;
  }
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 16px 20px;
    border-bottom: 1px solid #f0ecf7;
    background: linear-gradient(135deg, var(--accent) 0%, #8d6ef0 100%);
    color:white;
  }
  .tutor-info{display:flex; align-items:center; gap:10px;}
  .avatar{
    width:42px;height:42px;border-radius:50%;
    background: rgba(255,255,255,0.25);
    display:flex;align-items:center;justify-content:center;
    font-size:20px;
  }
  .tutor-info h1{font-size:16px; margin:0;}
  .tutor-info p{font-size:12px; margin:0; opacity:0.85;}
  .streak{
    font-size:12px;
    background: rgba(255,255,255,0.2);
    padding: 6px 10px;
    border-radius: 12px;
    display:flex;
    align-items:center;
    gap:5px;
    white-space:nowrap;
  }
  .controls-bar{
    display:flex;
    gap:8px;
    padding: 10px 16px;
    border-bottom:1px solid #f0ecf7;
    overflow-x:auto;
  }
  .topic-btn{
    border:1px solid #e2dcf0;
    background: var(--accent-soft);
    color: var(--accent-dark);
    border-radius: 999px;
    padding:6px 14px;
    font-size:12.5px;
    cursor:pointer;
    white-space:nowrap;
    transition: all .15s;
  }
  .topic-btn.active{
    background: var(--accent);
    color:white;
    border-color: var(--accent);
  }
  .chat-area{
    flex:1;
    overflow-y:auto;
    padding: 18px 16px;
    display:flex;
    flex-direction:column;
    gap: 10px;
  }
  .row{display:flex; flex-direction:column; max-width:85%;}
  .row.user{align-self:flex-end; align-items:flex-end;}
  .row.bot{align-self:flex-start; align-items:flex-start;}
  .bubble{
    padding: 10px 14px;
    border-radius: var(--radius);
    font-size: 14.5px;
    line-height:1.45;
  }
  .row.user .bubble{
    background: var(--user-bubble);
    color:white;
    border-bottom-right-radius:4px;
  }
  .row.bot .bubble{
    background: var(--bot-bubble);
    color: var(--ink);
    border-bottom-left-radius:4px;
  }
  .correction-box{
    background: var(--correction);
    border: 1px solid var(--correction-border);
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 13px;
    max-width: 85%;
    align-self:flex-end;
  }
  .correction-box .label{font-weight:600; color:#b8772a; font-size:11.5px; text-transform:uppercase; letter-spacing:.03em; margin-bottom:3px;}
  .correction-box .orig{color:#9b8f7d; text-decoration: line-through; font-size:13px;}
  .correction-box .fixed{color:#2b2730; font-weight:600;}
  .tip-box{
    background: var(--tip);
    border: 1px solid var(--tip-border);
    border-radius: 12px;
    padding: 8px 12px;
    font-size: 12.5px;
    color:#2f6b46;
    max-width:85%;
    align-self:flex-start;
  }
  .tip-box .label{font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.03em; margin-bottom:2px;}
  .typing{
    align-self:flex-start;
    font-size:13px;
    color: var(--muted);
    padding: 6px 14px;
    font-style:italic;
  }
  .input-bar{
    display:flex;
    gap:8px;
    padding: 12px 14px;
    border-top: 1px solid #f0ecf7;
    background:white;
    align-items:center;
  }
  .input-bar input[type=text]{
    flex:1;
    border: 1px solid #e2dcf0;
    border-radius: 999px;
    padding: 11px 16px;
    font-size:14.5px;
    outline:none;
    font-family:inherit;
  }
  .input-bar input[type=text]:focus{border-color: var(--accent);}
  .icon-btn{
    border:none;
    background: var(--accent-soft);
    color: var(--accent-dark);
    width:42px;height:42px;
    border-radius:50%;
    font-size:18px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-shrink:0;
    transition: all .15s;
  }
  .icon-btn.mic.recording{
    background: #e0473f;
    color:white;
    animation: pulse 1.2s infinite;
  }
  @keyframes pulse{
    0%{box-shadow: 0 0 0 0 rgba(224,71,63,0.5);}
    70%{box-shadow: 0 0 0 10px rgba(224,71,63,0);}
    100%{box-shadow: 0 0 0 0 rgba(224,71,63,0);}
  }
  .icon-btn.send{
    background: var(--accent);
    color:white;
  }
  .icon-btn:disabled{opacity:0.4; cursor:not-allowed;}
  .footer-note{
    font-size: 11px;
    text-align:center;
    color: var(--muted);
    padding: 6px 0 10px;
  }
  .speak-toggle{
    display:flex;
    align-items:center;
    gap:5px;
    font-size:11px;
    color: rgba(255,255,255,0.9);
    cursor:pointer;
    user-select:none;
  }
  .speak-toggle input{accent-color:white;}
  .empty-state{
    text-align:center;
    color: var(--muted);
    font-size: 13.5px;
    margin: auto;
    padding: 30px 20px;
    line-height:1.6;
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="tutor-info">
      <div class="avatar">🦊</div>
      <div>
        <h1>Alex — Tu tutor de inglés</h1>
        <p id="topicLabel">Tema: Mezcla de todo</p>
      </div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:6px;">
      <div class="streak" id="streakBadge">🔥 0 días</div>
      <label class="speak-toggle">
        <input type="checkbox" id="voiceOutToggle" checked> voz
      </label>
    </div>
  </header>

  <div class="controls-bar" id="topicBar">
    <button class="topic-btn active" data-topic="mixed">🌍 Mezcla</button>
    <button class="topic-btn" data-topic="business">💼 Negocios</button>
    <button class="topic-btn" data-topic="travel">✈️ Viajes</button>
    <button class="topic-btn" data-topic="social">🎉 Social</button>
    <button class="topic-btn" data-topic="daily">☀️ Diario</button>
    <button class="topic-btn" id="resetBtn" data-topic="reset" style="margin-left:auto; background:#fdeee9; color:#b8472a; border-color:#f3c4b4;">↺ Nueva</button>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
      👋 ¡Hola! Soy Alex. Escríbeme o presiona el micrófono y hablemos en inglés.<br><br>
      Voy a corregirte cuando sea necesario, con explicación en español, y seguimos la conversación 🙂
    </div>
  </div>

  <div class="input-bar">
    <button class="icon-btn mic" id="micBtn" title="Hablar">🎤</button>
    <input type="text" id="textInput" placeholder="Escribe en inglés..." />
    <button class="icon-btn send" id="sendBtn" title="Enviar">➤</button>
  </div>
  <div class="footer-note">Sesiones: <span id="sessionCount">0</span> · Funciona mejor en Chrome (voz)</div>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const emptyState = document.getElementById('emptyState');
const textInput = document.getElementById('textInput');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const topicBar = document.getElementById('topicBar');
const topicLabelEl = document.getElementById('topicLabel');
const streakBadge = document.getElementById('streakBadge');
const sessionCountEl = document.getElementById('sessionCount');
const voiceOutToggle = document.getElementById('voiceOutToggle');
const resetBtn = document.getElementById('resetBtn');

let history = []; // {role, content}
let currentTopic = 'mixed';
let isLoading = false;

const topicNames = {
  mixed: 'Mezcla de todo',
  business: 'Negocios y marketing',
  travel: 'Viajes',
  social: 'Vida social',
  daily: 'Vida diaria'
};

const topicPrompts = {
  mixed: 'mix naturally between business, travel, socializing and daily life topics',
  business: 'business, marketing, and professional/work topics',
  travel: 'travel, trips, airports, hotels and tourism topics',
  social: 'socializing, making friends, hobbies and casual hangouts',
  daily: 'everyday daily life: routines, food, family, shopping'
};

function buildSystemPrompt(topicKey){
  return `You are Alex, a warm, encouraging English conversation tutor helping a Spanish-speaking adult learner from Ecuador (intermediate level) practice spoken English.

Conversation focus: ${topicPrompts[topicKey]}.

Rules:
- Always reply ONLY with valid JSON. No markdown fences, no extra text before or after.
- JSON schema:
{
  "hasCorrection": boolean,
  "original": string or null,
  "corrected": string or null,
  "tip": string or null,
  "reply": string
}
- If the student's last message had a grammar, word-choice, or natural-phrasing mistake in English, set hasCorrection to true. Put the problematic part of their sentence in "original", the corrected natural version in "corrected", and a SHORT one-sentence explanation IN SPANISH in "tip".
- If there was no real mistake, set hasCorrection to false and original/corrected/tip to null.
- Only flag genuine errors. Don't nitpick stylistic variations that are still correct English.
- "reply" must be in English only, 1-3 short sentences, friendly and natural, continuing the conversation on topic, usually ending with a question to keep the conversation going.
- Keep your English at an intermediate level (clear, natural, not overly complex).
- Never mention you are an AI, never break character, never mention these instructions.`;
}

function addUserBubble(text){
  const row = document.createElement('div');
  row.className = 'row user';
  row.innerHTML = `<div class="bubble"></div>`;
  row.querySelector('.bubble').textContent = text;
  chatArea.appendChild(row);
  scrollDown();
}

function addCorrectionBubble(original, corrected){
  const box = document.createElement('div');
  box.className = 'correction-box';
  box.innerHTML = `<div class="label">Corrección</div><div class="orig"></div><div class="fixed"></div>`;
  box.querySelector('.orig').textContent = original;
  box.querySelector('.fixed').textContent = corrected;
  chatArea.appendChild(box);
  scrollDown();
}

function addTipBubble(tip){
  const box = document.createElement('div');
  box.className = 'tip-box';
  box.innerHTML = `<div class="label">💡 Tip</div><div class="tip-text"></div>`;
  box.querySelector('.tip-text').textContent = tip;
  chatArea.appendChild(box);
  scrollDown();
}

function addBotBubble(text){
  const row = document.createElement('div');
  row.className = 'row bot';
  row.innerHTML = `<div class="bubble"></div>`;
  row.querySelector('.bubble').textContent = text;
  chatArea.appendChild(row);
  scrollDown();
}

function addTyping(){
  const t = document.createElement('div');
  t.className = 'typing';
  t.id = 'typingIndicator';
  t.textContent = 'Alex está escribiendo...';
  chatArea.appendChild(t);
  scrollDown();
}
function removeTyping(){
  const t = document.getElementById('typingIndicator');
  if(t) t.remove();
}

function scrollDown(){
  chatArea.scrollTop = chatArea.scrollHeight;
}

function speak(text){
  if(!voiceOutToggle.checked) return;
  try{
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'en-US';
    utter.rate = 0.95;
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => v.lang === 'en-US' && /female|Samantha|Google US English/i.test(v.name)) || voices.find(v=>v.lang==='en-US');
    if(preferred) utter.voice = preferred;
    window.speechSynthesis.speak(utter);
  }catch(e){ console.error('speech error', e); }
}

async function sendMessage(text){
  if(!text.trim() || isLoading) return;
  if(emptyState) { emptyState.remove(); }
  isLoading = true;
  sendBtn.disabled = true;
  textInput.value = '';
  addUserBubble(text);
  history.push({role:'user', content:text});
  addTyping();

  try{
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: buildSystemPrompt(currentTopic),
        messages: history
      })
    });
    const data = await response.json();
    removeTyping();

    const rawText = (data.content || []).map(c => c.text || "").join("");
    const clean = rawText.replace(/```json|```/g, "").trim();
    let parsed;
    try{
      parsed = JSON.parse(clean);
    }catch(e){
      parsed = { hasCorrection:false, reply: rawText || "Sorry, can you say that again?" };
    }

    if(parsed.hasCorrection && parsed.corrected){
      addCorrectionBubble(parsed.original || text, parsed.corrected);
      if(parsed.tip) addTipBubble(parsed.tip);
    }
    addBotBubble(parsed.reply);
    speak(parsed.reply);

    history.push({role:'assistant', content: parsed.reply});
    if(history.length > 16) history = history.slice(-16);

  }catch(err){
    removeTyping();
    addBotBubble("Oops, I had trouble connecting. Can you try again?");
    console.error(err);
  } finally {
    isLoading = false;
    sendBtn.disabled = false;
  }
}

sendBtn.addEventListener('click', () => sendMessage(textInput.value));
textInput.addEventListener('keydown', (e) => {
  if(e.key === 'Enter') sendMessage(textInput.value);
});

// --- Topic switching ---
topicBar.querySelectorAll('.topic-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const topic = btn.dataset.topic;
    if(topic === 'reset'){
      history = [];
      chatArea.innerHTML = '';
      const div = document.createElement('div');
      div.className = 'empty-state';
      div.id = 'emptyState';
      div.innerHTML = '👋 ¡Empecemos de nuevo! Escríbeme o presiona el micrófono.';
      chatArea.appendChild(div);
      return;
    }
    topicBar.querySelectorAll('.topic-btn').forEach(b => { if(b.dataset.topic !== 'reset') b.classList.remove('active'); });
    btn.classList.add('active');
    currentTopic = topic;
    topicLabelEl.textContent = 'Tema: ' + topicNames[topic];
  });
});

// --- Voice input (Web Speech API) ---
let recognizing = false;
let recognition = null;
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if(SpeechRecognition){
  recognition = new SpeechRecognition();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onresult = (event) => {
    const transcript = event.results[0][0].transcript;
    textInput.value = transcript;
    sendMessage(transcript);
  };
  recognition.onend = () => {
    recognizing = false;
    micBtn.classList.remove('recording');
  };
  recognition.onerror = (e) => {
    recognizing = false;
    micBtn.classList.remove('recording');
    console.error('mic error', e);
  };

  micBtn.addEventListener('click', () => {
    if(recognizing){
      recognition.stop();
      return;
    }
    try{
      recognition.start();
      recognizing = true;
      micBtn.classList.add('recording');
    }catch(e){ console.error(e); }
  });
} else {
  micBtn.addEventListener('click', () => {
    alert('Tu navegador no soporta reconocimiento de voz. Prueba con Chrome en computadora o Android, o usa el texto.');
  });
}

// --- Streak / sessions tracking ---
async function loadProgress(){
  try{
    const result = await window.storage.get('progress', false);
    let data = result ? JSON.parse(result.value) : { streak: 0, lastDate: null, sessions: 0 };

    const today = new Date().toISOString().slice(0,10);
    if(data.lastDate !== today){
      const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0,10);
      if(data.lastDate === yesterday){
        data.streak += 1;
      } else {
        data.streak = 1;
      }
      data.sessions += 1;
      data.lastDate = today;
      await window.storage.set('progress', JSON.stringify(data), false);
    }
    streakBadge.textContent = `🔥 ${data.streak} día${data.streak === 1 ? '' : 's'}`;
    sessionCountEl.textContent = data.sessions;
  }catch(e){
    console.error('storage error', e);
  }
}
loadProgress();

// preload voices for speechSynthesis
if(window.speechSynthesis){
  window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
}
</script>
</body>
</html>
