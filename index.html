<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Agujero Negro del Amor</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Quicksand',sans-serif;}
canvas{display:block;position:fixed;top:0;left:0;width:100%;height:100%;}

#modal{
  position:fixed;inset:0;z-index:9999;
  display:flex;justify-content:center;align-items:center;
  background:#F9B8D4;
  transition:opacity 1s ease;
}
#modal.oculto{opacity:0;pointer-events:none;}

.card{
  background:#fff;
  border-radius:28px;
  padding:26px 26px 30px;
  width:min(340px, 88vw);
  display:flex;flex-direction:column;align-items:center;
  box-shadow:0 6px 32px rgba(220,80,130,0.13);
}

.card-img-wrap{
  width:100%;border-radius:14px;overflow:hidden;
  margin-bottom:22px;
  aspect-ratio:4/3;
}
.card-img-wrap img{
  width:100%;height:100%;object-fit:cover;
}

.card-quote{
  font-family:'Cormorant Garamond',serif;
  font-style:italic;
  font-size:1.3rem;
  text-align:center;
  margin-bottom:10px;
}

.card-sub{
  font-size:0.6rem;
  letter-spacing:5px;
  text-transform:uppercase;
  margin-bottom:26px;
}

#btn-entrar{
  width:100%;
  padding:1rem 0;
  border-radius:50px;
  border:1.5px solid #E0306A;
  cursor:pointer;
}

.top-text{display:none;}
#hint{display:none;}
</style>
</head>

<body>

<div id="modal">
  <div class="card">
    <div class="card-img-wrap">
      <img src="https://i.postimg.cc/mgpQLsR9/desktop-wallpaper-cats-tumblr-galaxy-galaxy-cat.jpg">
    </div>
    <div class="card-quote">Tu forma de ser es única🪐</div>
    <div class="card-sub">Un universo · solo para ti</div>
    <button id="btn-entrar">Entrar</button>
  </div>
</div>

<canvas id="galaxy"></canvas>

<!-- AUDIO CORREGIDO -->
<audio id="musica" loop preload="auto" playsinline>
  <source src="musica-luna.mp3" type="audio/mpeg">
  <source src="musica-luna.ogg" type="audio/ogg">
</audio>

<!-- SCRIPT BOTÓN + AUDIO -->
<script>
const btn = document.getElementById('btn-entrar');

btn.addEventListener('click', () => {

  const m = document.getElementById('modal');
  m.classList.add('oculto');
  setTimeout(() => m.style.display = 'none', 1000);

  const audio = document.getElementById('musica');

  audio.muted = false;
  audio.volume = 1;
  audio.currentTime = 0;

  audio.play().catch(() => {
    document.body.addEventListener('click', () => {
      audio.play();
    }, { once: true });
  });

});
</script>

<!-- THREE.js SIN ERRORES -->
<script type="module">

import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({
  canvas:document.getElementById('galaxy')
});

renderer.setSize(innerWidth,innerHeight);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
camera.position.z = 5;

const geometry = new THREE.TorusKnotGeometry(1,0.3,100,16);
const material = new THREE.MeshBasicMaterial({color:0xff69b4});
const mesh = new THREE.Mesh(geometry,material);

scene.add(mesh);

const controls = new OrbitControls(camera,renderer.domElement);

function animate(){
  requestAnimationFrame(animate);
  mesh.rotation.x += 0.01;
  mesh.rotation.y += 0.01;
  controls.update();
  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
